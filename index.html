<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Saber 11 - Inglés Dinámico</title>
    <style>
        :root {
            --primary: #007AFF;
            --success: #28a745;
            --error: #dc3545;
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #1C1C1E;
            --subtext: #8E8E93;
            --gap-bg: #f0f0f5;
            --nav-gray: #E5E5EA; /* Color sólido para las flechas */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding-bottom: 40px;
        }

        header {
            background: var(--card);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .btn-open-menu {
            display: flex;
            align-items: center;
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
        }

        .progress-container {
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            height: 5px;
            background: #E5E5EA;
            z-index: 99;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #007AFF, #34C759);
            transition: width 0.4s ease;
        }

        .container {
            padding: 20px 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .reading-card {
            background: var(--card);
            border-radius: 28px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Banner de Color Dinámico superior */
        .card-banner {
            width: 100%;
            padding: 20px 25px 0 25px; /* Espacio interno para el contenido dentro del banner */
            box-sizing: border-box;
            background: #f0f0f5; /* Color por defecto */
        }

        /* Navegación dentro del Banner */
        .text-header-nav {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.3); /* Línea sutil dentro del banner */
        }

        .text-header-nav h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 800;
            color: white; /* Texto blanco sobre el banner de color */
            text-align: center;
            flex: 1;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .nav-btn-header {
            background: var(--nav-gray); /* Color sólido */
            color: var(--text);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .nav-btn-header:active { transform: scale(0.9); background: #D1D1D6; }
        .nav-btn-header:disabled { opacity: 0.3; cursor: not-allowed; background: #E5E5EA; }

        .card-content {
            padding: 25px;
        }

        .gap {
            background: var(--gap-bg);
            color: var(--primary);
            padding: 2px 10px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid transparent;
            display: inline-block;
            margin: 2px 0;
        }

        .gap.filled { border-color: var(--primary); background: #fff; color: #333; }
        .gap.correct { background: #d4edda !important; color: #155724 !important; border-color: #c3e6cb !important; }
        .gap.incorrect { background: #f8d7da !important; color: #721c24 !important; border-color: #f5c6cb !important; }

        .check-btn {
            width: 100%;
            margin-top: 30px;
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.25);
            transition: all 0.2s;
        }
        .check-btn:active { transform: translateY(2px); }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal {
            background: #fff;
            width: 88%;
            max-width: 340px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: modalIn 0.3s ease-out;
        }
        @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .modal-header {
            background: #F8F9FA;
            padding: 18px;
            text-align: center;
            font-size: 13px;
            font-weight: 800;
            color: var(--subtext);
            text-transform: uppercase;
            border-bottom: 1px solid #EEE;
        }

        .opt-list { padding: 20px; }

        .opt-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 12px;
            border: 1px solid #E5E5EA;
            border-radius: 20px;
            background: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .opt-btn:active { background: #F2F2F7; border-color: #D1D1D6; }

        .opt-letter {
            width: 38px;
            height: 38px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 800;
            flex-shrink: 0;
            box-shadow: 0 2px 4px rgba(0,122,255,0.2);
        }

        .opt-text {
            flex-grow: 1;
            text-align: center;
            margin-right: 38px;
            color: var(--text);
        }

        /* RESULTADOS */
        .results-panel {
            margin-top: 25px;
            padding: 20px;
            background: #F8F9FA;
            border-radius: 20px;
            display: none;
            text-align: center;
            border: 1px solid #EEE;
        }

        #feedback-msg {
            font-weight: 900;
            font-size: 22px;
            color: var(--primary);
            margin-bottom: 20px;
            display: block;
        }

        .res-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .res-item {
            padding: 15px 5px;
            border-radius: 18px;
            background: white;
            border: 1px solid #EEE;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .res-val { font-size: 24px; font-weight: 800; display: block; }
        .res-lab { font-size: 10px; text-transform: uppercase; font-weight: 700; color: var(--subtext); margin-top: 5px; display: block;}

        #menu { 
            height: 100%; width: 280px; position: fixed; 
            top: 0; left: -280px; background: white; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 300; overflow-y: auto;
            box-shadow: 5px 0 25px rgba(0,0,0,0.1);
        }
        #menu a { color: var(--text); padding: 18px 25px; text-decoration: none; display: block; border-bottom: 1px solid #F2F2F7; font-weight: 500;}
        #menu a.active { background: #F2F8FF; color: var(--primary); font-weight: 800; border-left: 6px solid var(--primary); }

        .menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 250; backdrop-filter: blur(2px);}
    </style>
</head>

    <script>
        // Configuración de audio
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playResultSound(isGood) {

        const textDatabase = {
            1: { title: "Luthiers", content: `A luthier is a person who builds musical instruments and (0)_______ them beautiful and useful. They are usually able to work on different instruments; however, they <span class="gap" data-id="100" onclick="showPop(100)">100</span> choose instruments that belong to a type, like violins and guitars that are <span class="gap" data-id="101" onclick="showPop(101)">101</span> similar. <br><br> They use <span class="gap" data-id="102" onclick="showPop(102)">102</span> materials, from wood to metal, and a variety of machines and equipment to cut and put the parts together to make amazing instruments, <span class="gap" data-id="103" onclick="showPop(103)">103</span> are played by awesome musicians. <br><br> Sometimes, instruments get <span class="gap" data-id="104" onclick="showPop(104)">104</span> because they are old, or they stop working <span class="gap" data-id="105" onclick="showPop(105)">105</span> an accident. So, repairing instruments is <span class="gap" data-id="106" onclick="showPop(106)">106</span> part of a luthier’s job. <br><br> There are some facts you have to know <span class="gap" data-id="107" onclick="showPop(107)">107</span> you’d like to be a luthier.`, questions: { 100: { opts: ["often", "once", "ever"], corr: "often" }, 101: { opts: ["enough", "over", "quite"], corr: "quite" }, 102: { opts: ["every", "several", "less"], corr: "several" }, 103: { opts: ["where", "which", "who"], corr: "which" }, 104: { opts: ["break", "breaking", "broken"], corr: "broken" }, 105: { opts: ["after", "along", "around"], corr: "after" }, 106: { opts: ["both", "either", "another"], corr: "another" }, 107: { opts: ["so", "if", "while"], corr: "if" } } },
            2: { title: "Repair Cafés", content: `Repair Cafés are free meeting places (0)_______ you'll find equipment and specialists who will help you make things as good as new. Visitors from <span class="gap" data-id="105" onclick="showPop(105)">105</span> the world bring broken objects such as furniture or laptops, and work among people with amazing technical abilities in <span class="gap" data-id="106" onclick="showPop(106)">106</span> fields. <br><br> If you don’t have <span class="gap" data-id="107" onclick="showPop(107)">107</span> that needs repairing, you can still stay and enjoy a delicious snack. At the same time you can help someone <span class="gap" data-id="108" onclick="showPop(108)">108</span>. <br><br> Martina Becker <span class="gap" data-id="109" onclick="showPop(109)">109</span> the first Repair Café in Amsterdam in 2009. <span class="gap" data-id="110" onclick="showPop(110)">110</span> she was working there, she dreamed of opening the Repair Café Foundation. She finally did so some years later. This organization has offered help in building new cafés in the Netherlands <span class="gap" data-id="111" onclick="showPop(111)">111</span> 2011. Today, Martina feels the <span class="gap" data-id="112" onclick="showPop(112)">112</span> person on the planet.`, questions: { 105: { opts: ["above", "outside", "around"], corr: "around" }, 106: { opts: ["several", "each", "much"], corr: "several" }, 107: { opts: ["anything", "anywhere", "anyone"], corr: "anything" }, 108: { opts: ["once", "else", "enough"], corr: "else" }, 109: { opts: ["began", "begin", "begun"], corr: "began" }, 110: { opts: ["So", "While", "Except"], corr: "While" }, 111: { opts: ["since", "for", "until"], corr: "since" }, 112: { opts: ["lucky", "luckier", "luckiest"], corr: "luckiest" } } },
            3: { title: "Music Writer", content: `I'm a music writer and play (0)_______ instruments. I like making music <span class="gap" data-id="97" onclick="showPop(97)">97</span> real sounds recorded from different places. So, I take the music that I <span class="gap" data-id="98" onclick="showPop(98)">98</span> created in the studio and I play it in concerts. <br><br> I record on the computer like <span class="gap" data-id="99" onclick="showPop(99)">99</span> does it today, and I also play real instruments. I edit all the music <span class="gap" data-id="100" onclick="showPop(100)">100</span> with the help of a computer. <br><br> I would say I spend <span class="gap" data-id="101" onclick="showPop(101)">101</span> of the time doing that. But it doesn't matter because now I know that music is a bridge <span class="gap" data-id="102" onclick="showPop(102)">102</span> the audience and the story, and it has <span class="gap" data-id="103" onclick="showPop(103)">103</span> a key part in films and plays. <br><br> Finally, I decided to continue working <span class="gap" data-id="104" onclick="showPop(104)">104</span> on this kind of music field because my job is the best experience.`, questions: { 97: { opts: ["uses", "use", "using"], corr: "using" }, 98: { opts: ["having", "has", "have"], corr: "have" }, 99: { opts: ["everybody", "everything", "somebody"], corr: "everybody" }, 100: { opts: ["yourself", "myself", "herself"], corr: "myself" }, 101: { opts: ["many", "most", "few"], corr: "most" }, 102: { opts: ["around", "between", "inside"], corr: "between" }, 103: { opts: ["becomes", "became", "become"], corr: "become" }, 104: { opts: ["hardest", "hard", "hardly"], corr: "hard" } } },
            4: { title: "Lynda Carter", content: `Lynda Carter, the American star, wasn't really popular as a schoolchild because she wasn't very good-looking. As she was (o)_______ than most boys, they usually laughed at her. She was <span class="gap" data-id="100" onclick="showPop(100)">100</span> called "Olive", like Popeye's thin girlfriend. <br><br> At the age of 15, she wanted to become a singer <span class="gap" data-id="101" onclick="showPop(101)">101</span> she changed the spelling of her first name from Linda to Lynda because she always said to <span class="gap" data-id="102" onclick="showPop(102)">102</span> it seemed more interesting. Two years later, she was singing in two different groups and traveling all <span class="gap" data-id="103" onclick="showPop(103)">103</span> the country. <br><br> In 1974, Lynda went to Los Angeles and <span class="gap" data-id="104" onclick="showPop(104)">104</span> acting on television. She <span class="gap" data-id="105" onclick="showPop(105)">105</span> continued playing her music at concerts, and recorded her only album, Portrait. Later, she was <span class="gap" data-id="106" onclick="showPop(106)">106</span> to act in "Wonder Woman". It was a successful TV program that <span class="gap" data-id="107" onclick="showPop(107)">107</span> loved.`, questions: { 100: { opts: ["anyway", "however", "even"], corr: "even" }, 101: { opts: ["so", "as", "if"], corr: "so" }, 102: { opts: ["himself", "herself", "yourself"], corr: "herself" }, 103: { opts: ["among", "over", "beside"], corr: "over" }, 104: { opts: ["beginning", "begin", "began"], corr: "began" }, 105: { opts: ["also", "just", "once"], corr: "also" }, 106: { opts: ["invite", "inviting", "invited"], corr: "invited" }, 107: { opts: ["everyone", "something", "everything"], corr: "everyone" } } },

            18: { title: "Fast food vs. Slow food", content: `The term "fast food" is (0)__________ for restaurants that serve cheap meals <span class="gap" data-id="98" onclick="showPop(98)">98</span> in paper bags or boxes, for example burgers and French fries. Fast food <span class="gap" data-id="99" onclick="showPop(99)">99</span> popular in the United States in the 1950s, but today, it's known that it is bad for your body. <br><br> There's also "slow food". It began in 1986 thanks to Carlo Petrini, an Italian journalist <span class="gap" data-id="100" onclick="showPop(100)">100</span> visited a McDonald's restaurant in Rome. He thought it was horrible. <br><br> <span class="gap" data-id="101" onclick="showPop(101)">101</span>, Petrini started "slow food", which is about <span class="gap" data-id="102" onclick="showPop(102)">102</span> fresh food that is cooked for a longer time; that's why this food is <span class="gap" data-id="103" onclick="showPop(103)">103</span>. It has two goals: to make the food of your town popular, and to buy food grown <span class="gap" data-id="104" onclick="showPop(104)">104</span> small farmers. This movement now has <span class="gap" data-id="105" onclick="showPop(105)">105</span> 80,000 members in 100 countries.`, questions: { 98: { opts: ["quickly", "quickest", "quicker"], corr: "quickly" }, 99: { opts: ["becoming", "become", "became"], corr: "became" }, 100: { opts: ["what", "who", "which"], corr: "who" }, 101: { opts: ["So", "If", "As"], corr: "So" }, 102: { opts: ["eat", "eaten", "eating"], corr: "eating" }, 103: { opts: ["healthiest", "health", "healthier"], corr: "healthier" }, 104: { opts: ["by", "near", "off"], corr: "by" }, 105: { opts: ["until", "over", "across"], corr: "over" } } },
            19: { title: "The Olympic Games", content: `In 1896, a French man called Pierre de Coubertin began the modern Olympics. He was (0)____ interested in sports, and he felt it would be amazing to see all the countries <span class="gap" data-id="98" onclick="showPop(98)">98</span> the world get together in a sports competition. Pierre <span class="gap" data-id="99" onclick="showPop(99)">99</span> drew the five colored rings <span class="gap" data-id="100" onclick="showPop(100)">100</span> in the Olympic Games. <br><br> Every time the games begin, carrying the Olympic fire from Greece to several countries isn't the <span class="gap" data-id="101" onclick="showPop(101)">101</span> job; actually, it's very hard. Also, <span class="gap" data-id="102" onclick="showPop(102)">102</span> country where the Olympic Games are held <span class="gap" data-id="103" onclick="showPop(103)">103</span> be chosen carefully. <br><br> The Olympic Games have <span class="gap" data-id="104" onclick="showPop(104)">104</span> the largest sports event in the world. There are Summer and Winter Games and <span class="gap" data-id="105" onclick="showPop(105)">105</span> than 30 sports are included. Certainly, the men and women who want to compete in the Olympic Games are prepared before the competition begins.`, questions: { 98: { opts: ["around", "by", "into"], corr: "around" }, 99: { opts: ["herself", "itself", "himself"], corr: "himself" }, 100: { opts: ["using", "use", "used"], corr: "used" }, 101: { opts: ["easiest", "easy", "easier"], corr: "easiest" }, 102: { opts: ["other", "each", "such"], corr: "each" }, 103: { opts: ["must", "shall", "could"], corr: "must" }, 104: { opts: ["become", "becoming", "becomes"], corr: "become" }, 105: { opts: ["soon", "more", "still"], corr: "more" } } },
            20: { title: "CLEOPATRA", content: `One of the (0)__________ famous women in world history was Cleopatra. She was the last Pharaoh of Egypt. She became queen of Egypt in 51 B.C. <span class="gap" data-id="86" onclick="showPop(86)">86</span> the age of eighteen. She was a descendant of one of Alexander the Great's generals. When she was twenty-one, Julius Caesar became <span class="gap" data-id="87" onclick="showPop(87)">87</span> well-known lover. Seven years <span class="gap" data-id="88" onclick="showPop(88)">88</span> she met Anthony. The romantic tragic relationship continued <span class="gap" data-id="89" onclick="showPop(89)">89</span> they died by suicide in 30 B.C. <br><br> Cleopatra was legendary. She was famous not <span class="gap" data-id="90" onclick="showPop(90)">90</span> for being intelligent, but also for being beautiful. She had brown hair and brown eyes and they looked <span class="gap" data-id="91" onclick="showPop(91)">91</span> they were cats' eyes. <br><br> Cleopatra was a woman of wonderful elegance and unusual intelligence. She was <span class="gap" data-id="92" onclick="showPop(92)">92</span> educated. She <span class="gap" data-id="93" onclick="showPop(93)">93</span> speak nine languages and she was also good at mathematics.`, questions: { 86: { opts: ["on", "to", "at"], corr: "at" }, 87: { opts: ["her", "their", "his"], corr: "her" }, 88: { opts: ["while", "ago", "later"], corr: "later" }, 89: { opts: ["when", "until", "but"], corr: "until" }, 90: { opts: ["only", "yet", "rather"], corr: "only" }, 91: { opts: ["after", "for", "like"], corr: "like" }, 92: { opts: ["highly", "high", "higher"], corr: "highly" }, 93: { opts: ["should", "may", "could"], corr: "could" } } }
        };

        let currentId = 1;
        let currentGapId = null;

        function loadText(id) {
            currentId = id;
            const data = textDatabase[id];
            const isFirst = id === 1;
            const isLast = id === Object.keys(textDatabase).length;
            
            // Asignar degradado único basado en el ID del texto
            const gradient = bannerGradients[id - 1] || "#f0f0f5";

            document.getElementById('main-content').innerHTML = `
                <div class="reading-card">
                    <div class="card-banner" style="background: ${gradient};">
                        <div class="text-header-nav">
                            <button class="nav-btn-header" onclick="navText(-1)" ${isFirst ? 'disabled' : ''}>‹</button>
                            <h2>${data.title}</h2>
                            <button class="nav-btn-header" onclick="navText(1)" ${isLast ? 'disabled' : ''}>›</button>
                        </div>
                    </div>
                    <div class="card-content">
                        <p>${data.content}</p>
                        <button class="check-btn" onclick="checkAnswers()">Verificar Resultados ✔</button>
                        <div id="results-panel" class="results-panel">
                            <div id="feedback-msg"></div>
                            <div class="res-grid">
                                <div class="res-item">
                                    <span class="res-val" id="count-total">0</span>
                                    <span class="res-lab">Total</span>
                                </div>
                                <div class="res-item" style="color:var(--success)">
                                    <span class="res-val" id="count-correct">0</span>
                                    <span class="res-lab">Correctas</span>
                                </div>
                                <div class="res-item" style="color:var(--error)">
                                    <span class="res-val" id="count-incorrect">0</span>
                                    <span class="res-lab">Incorrectas</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;

            // Resaltar en el menú
            document.querySelectorAll('#menu a').forEach(a => a.classList.remove('active'));
            const activeLink = document.getElementById(`menu-link-${id}`);
            if(activeLink) activeLink.classList.add('active');
            
            updateProgressBar();
            closeM();
            window.scrollTo(0,0);
        }

        function updateProgressBar() {
            const gaps = document.querySelectorAll('.gap');
            if (gaps.length === 0) return;
            const total = gaps.length;
            const filled = document.querySelectorAll('.gap.filled').length;
            document.getElementById('progress-bar').style.width = (filled / total * 100) + "%";
        }

        function showPop(id) {
            currentGapId = id;
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            textDatabase[currentId].questions[id].opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                // Estructura: Letra circular a la izquierda, texto centrado
                btn.innerHTML = `<span class="opt-letter">${String.fromCharCode(65+i)}</span><span class="opt-text">${opt}</span>`;
                btn.onclick = () => {
                    const g = document.querySelector(`.gap[data-id="${currentGapId}"]`);
                    g.innerText = opt; g.classList.add('filled');
                    g.classList.remove('correct', 'incorrect');
                    updateProgressBar();
                    closePop();
                };
                box.appendChild(btn);
            });
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function checkAnswers() {
            const data = textDatabase[currentId];
            let c = 0, inc = 0;
            const gaps = document.querySelectorAll('.gap');
            
            gaps.forEach(g => {
                const id = g.getAttribute('data-id');
                if (g.innerText.trim() === data.questions[id].corr) {
                    g.classList.add('correct'); c++;
                } else {
                    g.classList.add('incorrect'); inc++;
                }
            });

            document.getElementById('results-panel').style.display = 'block';
            document.getElementById('count-total').innerText = gaps.length;
            document.getElementById('count-correct').innerText = c;
            document.getElementById('count-incorrect').innerText = inc;
            
            const msg = document.getElementById('feedback-msg');
            if(c === gaps.length) { msg.innerText = "¡EXCELENTE! 🌟"; playResultSound(true); }
            else if(c >= gaps.length/2) { msg.innerText = "¡MUY BIEN! 👍"; playResultSound(true); }
            else { msg.innerText = "¡INTÉNTALO DE NUEVO! 💪"; playResultSound(false); }

            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        function navText(dir) {
            const nextId = currentId + dir;
            if (textDatabase[nextId]) loadText(nextId);
        }

        function buildMenu() {
            const list = document.getElementById('menu-list');
            Object.keys(textDatabase).forEach(id => {
                const a = document.createElement('a');
                a.id = `menu-link-${id}`;
                a.href = "#";
                a.innerText = `${id}. ${textDatabase[id].title}`;
                a.onclick = (e) => { e.preventDefault(); loadText(parseInt(id)); };
                list.appendChild(a);
            });
        }

        function closePop(e) { if(!e || e.target.id === 'modal-overlay') document.getElementById('modal-overlay').style.display = 'none'; }
        function openM() { document.getElementById('menu').style.left='0'; document.getElementById('m-overlay').style.display='block'; }
        function closeM() { document.getElementById('menu').style.left='-280px'; document.getElementById('m-overlay').style.display='none'; }

        // Inicialización
        buildMenu();
        loadText(1);
    </script>
</body>
</html>
