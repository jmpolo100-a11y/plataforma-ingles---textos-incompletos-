<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Saber 11 - Inglés Dinámico</title>
    <style>
        :root { --p: #1a2a3a; --a: #007aff; --bg: #f2f2f7; --w: #fff; --s: #27ae60; --e: #e74c3c; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); line-height: 1.5; padding-bottom: 20px; }
        
        /* Barra Superior */
        header { background: var(--w); height: 60px; display: flex; align-items: center; padding: 0 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #d1d1d6; }
        .btn-menu { font-size: 26px; color: var(--a); cursor: pointer; background: none; border: none; padding: 5px; }
        header h1 { font-size: 16px; margin: 0 auto; text-transform: uppercase; letter-spacing: 1px; }

        /* Contenedor Principal */
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        
        /* Tarjeta de Lectura */
        .reading-card { background: var(--w); padding: 20px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .reading-card h2 { margin-top: 0; color: var(--p); border-bottom: 2px solid var(--bg); padding-bottom: 10px; font-size: 22px; }
        
        /* Espacios (Gaps) */
        .gap { background: #e1f0ff; color: var(--a); padding: 2px 8px; border-radius: 6px; font-weight: bold; cursor: pointer; border: 1px dashed var(--a); display: inline-block; margin: 2px 0; -webkit-tap-highlight-color: transparent; }
        .gap.filled { background: #d1e9ff; color: #1a2a3a; border-style: solid; }
        .gap.correct { background-color: #e8fdf0 !important; color: var(--s) !important; border-color: var(--s) !important; }
        .gap.incorrect { background-color: #fff1f0 !important; color: var(--e) !important; border-color: var(--e) !important; }

        /* Botón de Verificar */
        .check-btn { width: 100%; margin-top: 20px; background: var(--s); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .check-btn:active { transform: scale(0.98); opacity: 0.9; }

        /* Panel de Resultados */
        .results-panel { margin-top: 20px; padding: 15px; background: #fff; border-radius: 12px; display: none; border: 2px solid #eee; text-align: center; }
        .score-box { display: flex; justify-content: space-around; margin-top: 10px; }
        .score-item { font-size: 13px; font-weight: bold; }
        .score-count { font-size: 22px; display: block; font-weight: 800; }

        /* Modal Pop-up */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal { background: var(--w); width: 85%; max-width: 320px; border-radius: 20px; padding: 20px; text-align: center; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .opt-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; background: #f9f9f9; font-size: 17px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .opt-btn:active { background: #eee; }

        /* Menú Hamburguesa */
        #menu { height: 100%; width: 270px; position: fixed; top: 0; left: -270px; background: var(--p); transition: 0.3s ease; z-index: 300; padding-top: 10px; box-shadow: 5px 0 15px rgba(0,0,0,0.2); }
        #menu .menu-header { color: white; padding: 20px; font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #2c3e50; margin-bottom: 10px;}
        #menu a { color: white; padding: 18px 20px; text-decoration: none; display: block; border-bottom: 1px solid #2c3e50; font-size: 16px; transition: 0.2s; }
        #menu a:active, #menu a.active { background-color: var(--a); }
        .menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 250; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="menu-header">Banco de Textos</div>
        <a href="#" onclick="loadText(1)" id="menu-1">1. Luthiers</a>
        <a href="#" onclick="loadText(2)" id="menu-2">2. Repair Cafés</a>
        <a href="#" style="opacity:0.4">3. Bloqueado...</a>
    </div>
    <div class="menu-overlay" id="m-overlay" onclick="closeM()"></div>

    <header>
        <button class="btn-menu" onclick="openM()">☰</button>
        <h1 id="app-title">PRÁCTICA ICFES</h1>
    </header>

    <div class="container" id="main-content">
        </div>

    <div class="modal-overlay" id="modal-overlay" onclick="closePop(event)">
        <div class="modal">
            <h3 id="modal-title" style="margin:0 0 10px 0; color:#555; font-size:18px;">Selecciona la opción</h3>
            <div id="options-box"></div>
        </div>
    </div>

    <script>
        // --- BANCO DE DATOS DE TEXTOS (Se ampliará hasta 20) ---
        const textDatabase = {
            1: {
                title: "Luthiers",
                content: `A luthier is a person who builds musical instruments and (0)_______ them beautiful and useful. They are usually able to work on different instruments; however, they 
                    <span class="gap" data-id="100" onclick="showPop(100)">100</span> choose instruments that belong to a type, like violins and guitars that are 
                    <span class="gap" data-id="101" onclick="showPop(101)">101</span> similar.
                    <br><br>
                    They use <span class="gap" data-id="102" onclick="showPop(102)">102</span> materials, from wood to metal, and a variety of machines and equipment to cut and put the parts together to make amazing instruments, 
                    <span class="gap" data-id="103" onclick="showPop(103)">103</span> are played by awesome musicians.
                    <br><br>
                    Sometimes, instruments get <span class="gap" data-id="104" onclick="showPop(104)">104</span> because they are old, or they stop working 
                    <span class="gap" data-id="105" onclick="showPop(105)">105</span> an accident. So, repairing instruments is 
                    <span class="gap" data-id="106" onclick="showPop(106)">106</span> part of a luthier’s job.
                    <br><br>
                    There are some facts you have to know <span class="gap" data-id="107" onclick="showPop(107)">107</span> you’d like to be a luthier.`,
                questions: {
                    100: { opts: ["often", "once", "ever"], corr: "often" },
                    101: { opts: ["enough", "over", "quite"], corr: "quite" },
                    102: { opts: ["every", "several", "less"], corr: "several" },
                    103: { opts: ["where", "which", "who"], corr: "which" },
                    104: { opts: ["break", "breaking", "broken"], corr: "broken" },
                    105: { opts: ["after", "along", "around"], corr: "after" },
                    106: { opts: ["both", "either", "another"], corr: "another" },
                    107: { opts: ["so", "if", "while"], corr: "if" }
                }
            },
            2: {
                title: "Repair Cafés",
                content: `Repair Cafés are free meeting places (0)_______ you'll find equipment and specialists who will help you make things as good as new. Visitors from 
                    <span class="gap" data-id="105" onclick="showPop(105)">105</span> the world bring broken objects such as furniture or laptops, and work among people with amazing technical abilities in 
                    <span class="gap" data-id="106" onclick="showPop(106)">106</span> fields. 
                    <br><br>
                    If you don’t have <span class="gap" data-id="107" onclick="showPop(107)">107</span> that needs repairing, you can still stay and enjoy a delicious snack. At the same time you can help someone 
                    <span class="gap" data-id="108" onclick="showPop(108)">108</span>.
                    <br><br>
                    Martina Becker <span class="gap" data-id="109" onclick="showPop(109)">109</span> the first Repair Café in Amsterdam in 2009. 
                    <span class="gap" data-id="110" onclick="showPop(110)">110</span> she was working there, she dreamed of opening the Repair Café Foundation. She finally did so some years later. This organization has offered help in building new cafés in the Netherlands 
                    <span class="gap" data-id="111" onclick="showPop(111)">111</span> 2011. Today, Martina feels the 
                    <span class="gap" data-id="112" onclick="showPop(112)">112</span> person on the planet.`,
                questions: {
                    105: { opts: ["above", "outside", "around"], corr: "around" },
                    106: { opts: ["several", "each", "much"], corr: "several" },
                    107: { opts: ["anything", "anywhere", "anyone"], corr: "anything" },
                    108: { opts: ["once", "else", "enough"], corr: "else" },
                    109: { opts: ["began", "begin", "begun"], corr: "began" },
                    110: { opts: ["So", "While", "Except"], corr: "While" },
                    111: { opts: ["since", "for", "until"], corr: "since" },
                    112: { opts: ["lucky", "luckier", "luckiest"], corr: "luckiest" }
                }
            }
        };

        // --- LÓGICA DE CARGA DINÁMICA ---
        let currentTextId = null;
        let currentGapId = null;

        function loadText(id) {
            currentTextId = id;
            const textData = textDatabase[id];
            
            // Actualizar interfaz
            document.getElementById('app-title').innerText = "TEXTO " + id;
            const container = document.getElementById('main-content');
            
            // Renderizar tarjeta
            container.innerHTML = `
                <div class="reading-card">
                    <h2>${textData.title}</h2>
                    <p>${textData.content}</p>
                    <button class="check-btn" onclick="checkAnswers()">Verificar Resultados ✔</button>
                    <div id="results-panel" class="results-panel">
                        <strong style="color:var(--p)">Resumen de desempeño:</strong>
                        <div class="score-box">
                            <div class="score-item" style="color:var(--s)">Correctas<span class="score-count" id="count-correct">0</span></div>
                            <div class="score-item" style="color:var(--e)">Incorrectas<span class="score-count" id="count-incorrect">0</span></div>
                            <div class="score-item" style="color:var(--a)">Total<span class="score-count" id="count-total">0/0</span></div>
                        </div>
                    </div>
                </div>
            `;
            
            // Actualizar estado del menú
            document.querySelectorAll('#menu a').forEach(a => a.classList.remove('active'));
            document.getElementById('menu-' + id).classList.add('active');
            
            closeM(); // Cerrar menú
            window.scrollTo(0, 0); // Ir arriba
        }

        // --- LÓGICA DE POP-UP (Modal) ---
        function showPop(id) {
            currentGapId = id;
            const textData = textDatabase[currentTextId];
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            
            // Generar botones A, B, C
            textData.questions[id].opts.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = String.fromCharCode(65 + index) + ". " + opt;
                btn.onclick = () => selectOpt(opt);
                box.appendChild(btn);
            });
            
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function selectOpt(word) {
            const gap = document.querySelector(`.gap[data-id="${currentGapId}"]`);
            if(gap) {
                gap.innerText = word;
                gap.classList.add('filled');
                gap.classList.remove('correct', 'incorrect'); // Limpiar correcciones previas
            }
            closePop();
        }

        function closePop(e) {
            if(!e || e.target.id === 'modal-overlay') document.getElementById('modal-overlay').style.display = 'none';
        }

        // --- LÓGICA DE VERIFICACIÓN ---
        function checkAnswers() {
            const textData = textDatabase[currentTextId];
            const gaps = document.querySelectorAll('.gap');
            let correct = 0, incorrect = 0, filled = 0;
            
            gaps.forEach(gap => {
                const id = gap.getAttribute('data-id');
                if (gap.classList.contains('filled')) {
                    filled++;
                    if (gap.innerText.trim() === textData.questions[id].corr) {
                        gap.classList.add('correct'); correct++;
                    } else {
                        gap.classList.add('incorrect'); incorrect++;
                    }
                }
            });

            // Mostrar Panel
            const panel = document.getElementById('results-panel');
            panel.style.display = 'block';
            document.getElementById('count-correct').innerText = correct;
            document.getElementById('count-incorrect').innerText = incorrect;
            document.getElementById('count-total').innerText = `${filled}/${gaps.length}`;
            
            // Scroll suave a resultados
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        // --- CONTROL DE MENÚ (Hamburguesa) ---
        function openM() { document.getElementById('menu').style.left='0'; document.getElementById('m-overlay').style.display='block'; }
        function closeM() { document.getElementById('menu').style.left='-270px'; document.getElementById('m-overlay').style.display='none'; }

        // --- INICIAR ---
        loadText(1); // Cargar texto 1 por defecto
    </script>
</body>
</html>
