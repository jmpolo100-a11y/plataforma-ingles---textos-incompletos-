 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Saber 11 - Inglés Dinámico</title>
    <style>
        :root {
            --primary: #007AFF;
            --success: #28a745;
            --error: #dc3545;
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #1C1C1E;
            --subtext: #8E8E93;
            --gap-bg: #f0f0f5;
            --nav-gray: #E5E5EA;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding-bottom: 40px;
        }

        header {
            background: var(--card);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .btn-open-menu {
            display: flex;
            align-items: center;
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
        }

        .progress-container {
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            height: 5px;
            background: #E5E5EA;
            z-index: 99;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #007AFF, #34C759);
            transition: width 0.4s ease;
        }

        .container {
            padding: 20px 15px;
            max-width: 600px;
            margin: 0 auto;
        }

        .reading-card {
            background: var(--card);
            border-radius: 28px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card-banner {
            width: 100%;
            padding: 20px 25px 0 25px;
            box-sizing: border-box;
        }

        .text-header-nav {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        .text-header-nav h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 800;
            color: white;
            text-align: center;
            flex: 1;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .nav-btn-header {
            background: var(--nav-gray);
            color: var(--text);
            border: 1px solid rgba(0,0,0,0.15);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .nav-btn-header:active { transform: scale(0.9); background: #D1D1D6; }
        .nav-btn-header:disabled { opacity: 0.3; cursor: not-allowed; }

        .card-content { padding: 25px; }

        .gap {
            background: var(--gap-bg);
            color: var(--primary);
            padding: 2px 10px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid transparent;
            display: inline-block;
            margin: 2px 0;
            font-size: 16px;
        }

        .gap.filled { border-color: var(--primary); background: #fff; color: #333; }
        .gap.correct { background: #d4edda !important; color: #155724 !important; border-color: #c3e6cb !important; }
        .gap.incorrect { background: #f8d7da !important; color: #721c24 !important; border-color: #f5c6cb !important; }

        .check-btn {
            width: 100%;
            margin-top: 30px;
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.25);
        }

        .timer-container { text-align: center; margin-top: 20px; }
        .timer-box {
            display: inline-block;
            background: #1C1C1E;
            color: #34C759;
            padding: 10px 20px;
            border-radius: 14px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 24px;
            font-weight: 800;
            border: 2px solid #333;
        }
        .timer-label { display: block; font-size: 10px; text-transform: uppercase; color: var(--subtext); font-weight: 800; margin-top: 5px; }

        .results-panel {
            margin-top: 25px;
            padding: 20px;
            background: #F8F9FA;
            border-radius: 20px;
            display: none;
            text-align: center;
            border: 1px solid #EEE;
        }
        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .res-item {
            padding: 15px 5px;
            border-radius: 18px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            border-width: 2px;
            border-style: solid;
        }
        .res-total { border-color: #1C1C1E; }
        .res-correct { border-color: var(--success); }
        .res-incorrect { border-color: var(--error); }
        .res-val { font-size: 24px; font-weight: 800; display: block; }
        .res-lab { font-size: 10px; text-transform: uppercase; font-weight: 700; color: var(--subtext); margin-top: 5px; display: block;}

        #menu { 
            height: 100%; width: 280px; position: fixed; 
            top: 0; left: -280px; background: white; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 300; overflow-y: auto;
            box-shadow: 5px 0 25px rgba(0,0,0,0.1);
        }
        #menu a { 
            color: var(--text); padding: 18px 25px; text-decoration: none; display: block; 
            border-bottom: 1px solid #F2F2F7; font-weight: 700; text-transform: uppercase; font-size: 13px;
        }
        #menu a.active { background: #F2F8FF; color: var(--primary); border-left: 6px solid var(--primary); }

        .firework { position: fixed; width: 6px; height: 6px; border-radius: 50%; pointer-events: none; z-index: 1000; animation: explode 1.2s ease-out forwards; }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .modal { background: #fff; width: 88%; max-width: 340px; border-radius: 28px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.2); animation: modalIn 0.3s ease-out; }
        @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .opt-btn { display: flex; align-items: center; width: 100%; padding: 12px 15px; margin-bottom: 12px; border: 1px solid #E5E5EA; border-radius: 20px; background: #fff; font-size: 16px; font-weight: 600; cursor: pointer; }
        .opt-letter { width: 38px; height: 38px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 800; flex-shrink: 0; }
        .opt-text { flex-grow: 1; text-align: center; margin-right: 38px; }
        .menu-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 250; backdrop-filter: blur(2px);}
    </style>
</head>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let seconds = 0;
        let timerInterval;
        let fwInterval = null;

        function playTone(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function playResultSound(isGood) {
            if (isGood) {
                playTone(523, 'sine', 0.15); setTimeout(() => playTone(659, 'sine', 0.25), 120);
            } else {
                playTone(150, 'square', 0.4);
            }
        }

        function playSuccessSound() {
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (i * 0.15));
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime + (i * 0.15));
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.15) + 0.8);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + (i * 0.15));
                osc.stop(audioCtx.currentTime + (i * 0.15) + 0.8);
            });
        }

        function createExplosion() {
            playSuccessSound();
            const x = Math.random() * window.innerWidth;
            const y = Math.random() * window.innerHeight * 0.5;
            for(let i=0; i<35; i++) {
                const p = document.createElement('div');
                p.className = 'firework';
                p.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 65%)`;
                p.style.left = x+'px'; p.style.top = y+'px';
                p.style.setProperty('--x', (Math.random()*500-250)+'px');
                p.style.setProperty('--y', (Math.random()*500-250)+'px');
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1200);
            }
        }

            9: { title: "Tour guides", content: `Tour guides take people on sightseeing trips (0) ______ places.`, questions: { 95: { opts: ["book", "booking", "booked"], corr: "book" } } },

        function startTimer() {
            clearInterval(timerInterval);
            seconds = 0;
            const timerEl = document.getElementById('timer-display');
            timerInterval = setInterval(() => {
                seconds++;
                let mins = Math.floor(seconds / 60);
                let secs = seconds % 60;
                if(timerEl) timerEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function stopFireworks() { if(fwInterval) { clearInterval(fwInterval); fwInterval = null; } }

        function loadText(id) {
            stopFireworks();
            currentId = id;
            const data = textDatabase[id];
            const isFirst = id === 1;
            const isLast = id === Object.keys(textDatabase).length;
            const gradient = bannerGradients[id - 1] || "linear-gradient(135deg, #CCC, #999)";

                            <div id="feedback-msg" style="font-weight:900; font-size:24px; color:var(--primary); margin-bottom:20px;"></div>
                            <div class="res-grid">
                                <div class="res-item res-total"><span class="res-val" id="count-total">0</span><span class="res-lab">Total</span></div>
                                <div class="res-item res-correct" style="color:var(--success)"><span class="res-val" id="count-correct">0</span><span class="res-lab">Bien</span></div>
                                <div class="res-item res-incorrect" style="color:var(--error)"><span class="res-val" id="count-incorrect">0</span><span class="res-lab">Mal</span></div>
                            </div>
                        </div>
                    </div>
                </div>`;
            
            startTimer();
            buildMenu();
            closeM();
            updateProgressBar();
            window.scrollTo(0,0);
        }

        function checkAnswers() {
            const data = textDatabase[currentId];
            let c = 0, inc = 0;
            const gaps = document.querySelectorAll('.gap');
            gaps.forEach(g => {
                const qid = g.getAttribute('data-id');
                if(g.innerText.trim() === data.questions[qid].corr) { g.classList.add('correct'); c++; }
                else { g.classList.add('incorrect'); inc++; }
            });

            document.getElementById('results-panel').style.display = 'block';
            document.getElementById('count-total').innerText = gaps.length;
            document.getElementById('count-correct').innerText = c;
            document.getElementById('count-incorrect').innerText = inc;

            const msg = document.getElementById('feedback-msg');
            if(c === gaps.length) {
                msg.innerText = "¡PERFECTO! 🌟";
                clearInterval(timerInterval);
                playResultSound(true);
                if(!fwInterval) fwInterval = setInterval(createExplosion, 800);
            } else {
                msg.innerText = c >= gaps.length/2 ? "¡MUY BIEN! 👍" : "¡SIGUE PRACTICANDO! 💪";
                playResultSound(c >= gaps.length/2);
                stopFireworks();
            }
        }

        function buildMenu() {
            const list = document.getElementById('menu-list');
            list.innerHTML = '';
            Object.keys(textDatabase).forEach(id => {
                const a = document.createElement('a');
                a.href = "#";
                a.innerText = `${id}. ${textDatabase[id].title}`;
                if(parseInt(id) === currentId) a.className = 'active';
                a.onclick = (e) => { e.preventDefault(); loadText(parseInt(id)); };
                list.appendChild(a);
            });
        }

        function updateProgressBar() {
            const gaps = document.querySelectorAll('.gap');
            if (gaps.length === 0) return;
            const filled = document.querySelectorAll('.gap.filled').length;
            document.getElementById('progress-bar').style.width = (filled / gaps.length * 100) + "%";
        }

        function showPop(id) {
            currentGapId = id;
            const box = document.getElementById('options-box');
            box.innerHTML = '';
            textDatabase[currentId].questions[id].opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerHTML = `<span class="opt-letter">${String.fromCharCode(65+i)}</span><span class="opt-text">${opt}</span>`;
                btn.onclick = () => {
                    const g = document.querySelector(`.gap[data-id="${currentGapId}"]`);
                    g.innerText = opt; g.classList.add('filled');
                    g.classList.remove('correct', 'incorrect');
                    updateProgressBar();
                    document.getElementById('modal-overlay').style.display = 'none';
                };
                box.appendChild(btn);
            });
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function navText(dir) { const nextId = currentId + dir; if(textDatabase[nextId]) loadText(nextId); }
        function openM() { document.getElementById('menu').style.left='0'; document.getElementById('m-overlay').style.display='block'; }
        function closeM() { document.getElementById('menu').style.left='-280px'; document.getElementById('m-overlay').style.display='none'; }
        function closePop(e) { if(e.target.id === 'modal-overlay') document.getElementById('modal-overlay').style.display = 'none'; }

        loadText(1);
    </script>
</body>
</html>
